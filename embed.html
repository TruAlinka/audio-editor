<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Плеер аудио/видео</title>
  <style>
    body {
      margin: 0; padding: 0; background: #fff;
      font-family: sans-serif; font-size: 15px; color: #544B68;
      display: flex; align-items: center; justify-content: center; min-height: 100vh;
    }
    .center { width: 98%; max-width: 540px; margin: 0 auto; }
    audio, video { width: 100%; outline:none; }
  </style>
</head>
<body>
  <div class="center" id="player">
    Загрузка...
  </div>
  <script>
    // Получаем параметры из URL
    const params = new URLSearchParams(window.location.search);
    const type = params.get('type');
    const src = params.get('src'); // НЕ обрабатываем и не меняем src!

    // Генерируем полный абсолютный путь к файлу
    function getAbsoluteUrl() {
      if (!src) return null;
      // Если src абсолютный — используем его как есть
      if (src.startsWith('http')) return src;
      // Если src относительный — строим от корня сайта
      const base = window.location.origin + window.location.pathname.replace(/\/embed.html.*$/, '/');
      return base + src;
    }
    const fullUrl = getAbsoluteUrl();
    const ext = (src || '').split('.').pop().toLowerCase();

    // Проверяем и выводим плеер
    if (!type || !src) {
      document.getElementById('player').innerHTML = '<span style="color:#d43f3a;">Ошибка: Не указан аудио/видео-файл.</span>';
    } else if (type === 'audio' && (ext === 'mp3' || ext === 'ogg' || ext === 'wav')) {
      document.getElementById('player').innerHTML = `<audio controls autoplay src="${fullUrl}">Ваш браузер не поддерживает аудио.</audio>`;
    } else if (type === 'video' && (ext === 'mp4' || ext === 'webm' || ext === 'mov')) {
      document.getElementById('player').innerHTML = `<video controls autoplay src="${fullUrl}" style="background:#222;">Ваш браузер не поддерживает видео.</video>`;
    } else {
      document.getElementById('player').innerHTML = `<span style="color:#d43f3a;">Неподдерживаемый тип файла или расширения.</span>`;
    }
  </script>
</body>
</html>

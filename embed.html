<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Плеер аудио/видео</title>
  <style>
    body {
      margin: 0; padding: 0; background: #fff;
      font-family: sans-serif; font-size: 15px; color: #544B68;
      display: flex; align-items: center; justify-content: center; min-height: 100vh;
    }
    .center { width: 98%; max-width: 540px; margin: 0 auto; }
    audio, video { width: 100%; outline:none; }
  </style>
</head>
<body>
  <div class="center" id="player">
    Загрузка...
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const type = params.get('type');
    const src = params.get('src');
    const safeSrc = src ? src.replace(/[^A-Za-z0-9._\-\/]/g, '') : '';
    const folder = safeSrc.startsWith('audio/') ? 'audio/' : (safeSrc.startsWith('video/') ? 'video/' : '');
    const filename = folder ? safeSrc.substring(folder.length) : '';

    function getFullUrl() {
      if (!type || !folder || !filename) return null;
      return `${window.location.origin}${window.location.pathname.replace(/\/[^\/]*$/, '')}/${folder}${filename}`;
    }

    const fullUrl = getFullUrl();
    const ext = filename.split('.').pop().toLowerCase();

    if (!type || !folder || !filename) {
      document.getElementById('player').innerHTML = '<span style="color:#d43f3a;">Ошибка: Не указан аудио/видео-файл.</span>';
    } else if (type === 'audio' && (ext === 'mp3' || ext === 'ogg' || ext === 'wav')) {
      document.getElementById('player').innerHTML = `<audio controls autoplay src="${fullUrl}">Ваш браузер не поддерживает аудио.</audio>`;
    } else if (type === 'video' && (ext === 'mp4' || ext === 'webm' || ext === 'mov')) {
      document.getElementById('player').innerHTML = `<video controls autoplay src="${fullUrl}" poster="" style="background:#222;">Ваш браузер не поддерживает видео.</video>`;
    } else {
      document.getElementById('player').innerHTML = `<span style="color:#d43f3a;">Неподдерживаемый тип файла или расширения.</span>`;
    }
  </script>
</body>
</html>

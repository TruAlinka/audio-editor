<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Генератор iFrame-кода для аудиоплеера</title>
</head>
<body>
  <h2>Генерация iFrame кода для ваших файлов</h2>
  <label>Имя файла (например, <b>audio/test.mp3</b>): <input type="text" id="filename" placeholder="audio/yourfile.mp3"></label>
  <button onclick="generate()">Сгенерировать код</button>
  <h3>Ваш iFrame:</h3>
  <textarea id="code" rows="3" style="width:100%;"></textarea>
  <script>
    function generate() {
      const filename = document.getElementById('filename').value.trim();
      if (!filename) {
        document.getElementById('code').value = 'Введите имя файла!';
        return;
      }
      let url = `https://trualinka.github.io/audio-editor/player.html?file=${encodeURIComponent(filename)}`;
      let code = `<iframe src="${url}" width="300" height="60"></iframe>`;
      document.getElementById('code').value = code;
    }
  </script>
</body>
</html>

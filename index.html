<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Генератор embed аудио</title>
</head>
<body>
  <h2>Генератор iFrame для аудио</h2>
  <input type="text" id="filename" placeholder="song.mp3"><br>
  <button onclick="generate()">Получить embed-код</button>
  <textarea id="code" rows="3" style="width:100%;"></textarea>

<script>
  function generate() {
    let repo = 'YOURNAME/REPO'; // поменять на свой github username/repo
    let file = document.getElementById('filename').value.trim();
    let url = `https://${repo}.github.io/player.html?file=audio/${file}`;
    let code = `<iframe src="${url}" width="300" height="60"></iframe>`;
    document.getElementById('code').value = code;
  }
</script>
</body>
</html>
